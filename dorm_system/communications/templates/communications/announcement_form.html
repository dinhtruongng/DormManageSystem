{% extends "base.html" %}
{% load status_tags %}
{% block title %}New announcement &middot; Dorm Management{% endblock %}
{% block content %}
<a href="{% url 'communications:list' %}" class="text-decoration-none small">&larr; Back to announcements</a>
<h3 class="mt-2 mb-3"><i class="bi bi-megaphone"></i> New announcement</h3>
<form method="post" class="card p-4">
  {% csrf_token %}
  <div class="mb-3"><label class="form-label">Title</label><input type="text" name="title" class="form-control" value="{{ form.title.value|default:'' }}">{{ form.title.errors }}</div>
  <div class="mb-3"><label class="form-label">Body</label><textarea name="body" class="form-control" rows="4">{{ form.body.value|default:'' }}</textarea>{{ form.body.errors }}</div>
  <div class="mb-3"><label class="form-label">Audience</label>
    <select name="audience" class="form-select">{% for value, label in form.audience.field.choices %}<option value="{{ value }}" {% if form.audience.value|stringformat:"s" == value|stringformat:"s" %}selected{% endif %}>{{ label }}</option>{% endfor %}</select>
  </div>
  {{ form.non_field_errors }}
  <button class="btn btn-primary" style="background: var(--primary); border-color: var(--primary)"><i class="bi bi-send"></i> Publish</button>
</form>
{% endblock %}
